<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Win Premium Button</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        /* Background for demonstration to match your theme */
        body {
            background: radial-gradient(circle at 50% 50%, #2a1a00 0%, #110900 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Outfit', sans-serif;
        }

        /* ── Premium Golden Button ── */
        .premium-btn {
            position: relative;
            padding: 16px 40px;
            font-size: 20px;
            font-weight: 800;
            color: #3d1f00; /* Dark brown for contrast on gold */
            text-transform: uppercase;
            letter-spacing: 1.5px;
            
            /* Golden Gradient with Depth */
            background: linear-gradient(135deg, #f0b344 0%, #ffd828 50%, #f0b344 100%);
            background-size: 200% auto;
            
            border: none;
            border-radius: 12px;
            cursor: pointer;
            
            /* Layered Shadows for 3D Effect */
            box-shadow: 
                0 4px 15px rgba(0, 0, 0, 0.6),            /* Outer drop shadow */
                inset 0 2px 4px rgba(255, 255, 255, 0.7),  /* Top inner highlight */
                inset 0 -2px 4px rgba(0, 0, 0, 0.3),       /* Bottom inner shadow */
                0 0 20px rgba(240, 179, 68, 0.3);          /* Glow */
            
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 12px;
            outline: 2px solid rgba(255, 255, 255, 0.1);
            outline-offset: 4px;
        }

        /* The Reflective Shine Sweep */
        .premium-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255, 255, 255, 0.8),
                transparent
            );
            transition: 0.6s;
        }

        /* Hover Interactions */
        .premium-btn:hover {
            transform: translateY(-6px) scale(1.03);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.7),
                inset 0 2px 6px rgba(255, 255, 255, 0.9),
                0 0 50px rgba(255, 215, 0, 0.5);
            background-position: right center;
            outline: 2px solid rgba(255, 215, 0, 0.4);
            color: #000;
        }

        .premium-btn:hover::before {
            left: 150%;
        }

        /* Active/Click State */
        .premium-btn:active {
            transform: translateY(2px) scale(0.96);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.8);
            transition: 0.1s;
        }

        /* Small Star icon detail */
        .btn-star {
            font-size: 22px;
            filter: drop-shadow(0 2px 0 rgba(255, 255, 255, 0.4));
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <button class="premium-btn" id="playNowBtn">
        <span class="btn-star">★</span>
        <span id="btnText">PLAY NOW</span>
    </button>

    <!-- API Dependencies -->
    <script src="G-Win-LOttery/configApi.js"></script>
    <script src="G-Win-LOttery/api.js"></script>

    <script>
        // Use Direct Login ONLY when the button is clicked
        document.getElementById('playNowBtn').addEventListener('click', function() {
            triggerLoginSequence();
        });

        async function triggerLoginSequence() {
            const btn = document.getElementById('playNowBtn');
            const btnText = document.getElementById('btnText');
            
            // Visual Feedback
            btn.style.opacity = '0.8';
            btn.style.pointerEvents = 'none';
            btnText.textContent = 'ACCESSING TERMINAL...';

            const username = 'anil';
            const password = '123456';

            try {
                console.log('Initiating direct login for:', username);
                const data = await window.GWinAPI.login(username, password);

                if (data && (data.status === true || data.status === "true")) {
                    // Store Session Data for the game
                    sessionStorage.setItem('user_id', data.user_id);
                    sessionStorage.setItem('username', data.username || username);
                    sessionStorage.setItem('balance', data.balance || '0');
                    sessionStorage.setItem('role', data.role || 'user');

                    // Successful Redirect
                    window.location.href = 'G-Win-LOttery/game/index.html';
                } else {
                    console.warn('API credentials invalid, attempting development fallback...');
                    performFallbackLogin();
                }
            } catch (error) {
                console.error('API connection failed, using development fallback:', error);
                performFallbackLogin();
            }
        }

        function performFallbackLogin() {
            // Local fallback to ensure the user can always enter the game
            // sessionStorage.setItem('username', 'anil');
            // sessionStorage.setItem('user_id', '276');
            // sessionStorage.setItem('balance', '789649');
            // sessionStorage.setItem('role', 'user');
            
            setTimeout(() => {
                window.location.href = 'G-Win-LOttery/game/index.html';
            }, 500);
        }
    </script>
</body>
</html>
